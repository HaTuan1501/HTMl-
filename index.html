<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Giao diện đăng nhập</title>
<style>
/* Bố cục cơ bản */
body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:#f3f4f6; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
.card { background:rgb(7, 218, 251); padding:24px; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.08); width:320px; }
h2 { margin-top:0; margin-bottom:12px; font-size:20px; }
label { display:block; font-size:14px; margin-bottom:6px; }
.field { margin-bottom:14px; }


/* Yêu cầu: chữ nhập họ tên màu xanh, chữ nhập mật khẩu màu đỏ */
input[type="text"].input-name { color: yellow; /* xanh dương */ }
input[type="password"].input-pass { color: #d52424; /* đỏ */ }


/* Tạo viền và kích thước input */
input[type="text"], input[type="password"] {
width:100%;
padding:10px 12px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:15px;
box-sizing:border-box;
outline:none;
}
input[type="text"]:focus, input[type="password"]:focus { box-shadow:0 0 0 4px rgba(59,130,246,0.08); border-color:#60a5fa; }


/* Nút gửi */
button[type="submit"] { width:100%; padding:10px 12px; border-radius:8px; border:0; background:#111827; color:white; font-weight:600; cursor:pointer; }
.note { font-size:13px; color:#6b7280; margin-top:10px; }


/* Placeholder màu nhạt phù hợp (tùy trình duyệt) */
::placeholder { color:#9ca3af; }
</style>
</head>
<body>
<form class="card" onsubmit="event.preventDefault(); alert('Đã gửi (mô phỏng)');">
<h2>Đăng nhập</h2>


<div class="field">
<label for="fullname">Họ và tên</label>
<input id="fullname" name="fullname" type="text" class="input-name" placeholder="Nhập họ và tên" autocomplete="name" required>
</div>


<div class="field">
<label for="password">Mật khẩu</label>
<input id="password" name="password" type="password" class="input-pass" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
</div>


<button type="submit">Đăng nhập</button>
<div class="note">Ghi chú: Đăng nhập vào để tham gia trò chơi.</div>
</form>
</body>
</html>
